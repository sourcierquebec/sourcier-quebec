services:
  web:
    build: .
    container_name: sourcier-web
    restart: unless-stopped
    networks:
      - traefik
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=n8n_default"
      - "traefik.http.routers.sourcier.rule=Host(`sourcier.thierrypoitras.com`)"
      - "traefik.http.routers.sourcier.entrypoints=web,websecure"
      - "traefik.http.routers.sourcier.tls=true"
      - "traefik.http.routers.sourcier.tls.certresolver=mytlschallenge"
      - "traefik.http.services.sourcier.loadbalancer.server.port=80"
      - "traefik.http.middlewares.sourcier-redirect.redirectscheme.scheme=https"
      - "traefik.http.middlewares.sourcier-redirect.redirectscheme.permanent=true"
      - "traefik.http.routers.sourcier-http.rule=Host(`sourcier.thierrypoitras.com`)"
      - "traefik.http.routers.sourcier-http.entrypoints=web"
      - "traefik.http.routers.sourcier-http.middlewares=sourcier-redirect"

networks:
  traefik:
    external: true
    name: n8n_default
